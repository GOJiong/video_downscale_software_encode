name: Encode Video — 1080p VP9 → 720p HEVC

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Direct download URL of the 1080p video (OneDrive: append &download=1)"
        required: true
        type: string
      size_ratio:
        description: "Target size ratio vs original (0.50 = 50% smaller)"
        required: false
        default: "0.50"
        type: string
      audio_kbps:
        description: "AAC audio bitrate in kbps"
        required: false
        default: "128"
        type: string

jobs:
  encode:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour ceiling; adjust if your video is very long

    steps:

      # ── 1. Download source video ───────────────────────────────────────────
      - name: Download source video
        run: |
          echo "Downloading from: ${{ inputs.video_url }}"
          curl -L --retry 3 --retry-delay 5 \
               -o source_video \
               "${{ inputs.video_url }}"
          echo "Download complete. File size: $(du -h source_video | cut -f1)"

      # ── 2. Probe + calculate target bitrate ───────────────────────────────
      - name: Probe source and calculate bitrate budget
        run: |
          echo "--- ffprobe output ---"
          ffprobe -v quiet \
                  -print_format json \
                  -show_format -show_streams \
                  source_video | tee probe.json

          # Pull values with python3 (always available on ubuntu-latest)
          python3 - <<'EOF'
          import json, os

          with open("probe.json") as f:
              data = json.load(f)

          fmt          = data["format"]
          size_bytes   = int(fmt["size"])
          duration_s   = float(fmt["duration"])
          total_kbps   = int(fmt.get("bit_rate", 0)) // 1000
          size_mb      = size_bytes / (1024 ** 2)

          ratio        = float(os.environ.get("INPUT_RATIO", "0.50"))
          audio_kbps   = int(os.environ.get("INPUT_AUDIO", "128"))

          target_bytes    = size_bytes * ratio
          target_total_k  = (target_bytes * 8) / (duration_s * 1000)
          video_kbps      = max(int(target_total_k - audio_kbps), 100)

          h = int(duration_s // 3600)
          m = int((duration_s % 3600) // 60)
          s = int(duration_s % 60)
          dur_fmt = f"{h}:{m:02d}:{s:02d}" if h else f"{m}:{s:02d}"

          print(f"\n=== Budget summary ===")
          print(f"  Duration       : {dur_fmt}")
          print(f"  Source size    : {size_mb:.1f} MB")
          print(f"  Source kbps    : {total_kbps:,}")
          print(f"  Target size    : ~{size_mb * ratio:.1f} MB  ({int(ratio*100)}% of source)")
          print(f"  Video budget   : {video_kbps:,} kbps")
          print(f"  Audio budget   : {audio_kbps} kbps AAC")

          if video_kbps < 500:
              print(f"\n  WARNING: video bitrate {video_kbps} kbps is low for 720p!")

          # Write to GITHUB_ENV so next steps can read them
          with open(os.environ["GITHUB_ENV"], "a") as env:
              env.write(f"VIDEO_KBPS={video_kbps}\n")
              env.write(f"AUDIO_KBPS={audio_kbps}\n")
          EOF
        env:
          INPUT_RATIO: ${{ inputs.size_ratio }}
          INPUT_AUDIO: ${{ inputs.audio_kbps }}

      # ── 3. Encode ──────────────────────────────────────────────────────────
      - name: Encode to 720p HEVC (x265 slow, AAC)
        run: |
          echo "Starting encode — video: ${VIDEO_KBPS} kbps, audio: ${AUDIO_KBPS} kbps"
          ffmpeg -y \
            -i source_video \
            -vf "scale=-2:720" \
            -c:v libx265 \
            -preset slow \
            -b:v "${VIDEO_KBPS}k" \
            -tag:v hvc1 \
            -c:a aac \
            -b:a "${AUDIO_KBPS}k" \
            output_720p.mp4

          echo ""
          echo "=== Result ==="
          SRC_SIZE=$(stat -c%s source_video)
          OUT_SIZE=$(stat -c%s output_720p.mp4)
          python3 -c "
          src=$SRC_SIZE; out=$OUT_SIZE
          print(f'  Source : {src/1024**2:.1f} MB')
          print(f'  Output : {out/1024**2:.1f} MB')
          print(f'  Reduction: {(1 - out/src)*100:.1f}%')
          "

      # ── 4. Upload artifact ────────────────────────────────────────────────
      - name: Upload encoded video
        uses: actions/upload-artifact@v4
        with:
          name: output_720p_hevc
          path: output_720p.mp4
          retention-days: 90
          if-no-files-found: error
