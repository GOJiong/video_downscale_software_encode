name: Ultra-Compact AV1 Phone Encode (720p)

on:
  workflow_dispatch:
    inputs:
      size_ratio:
        description: "Target output size ratio vs source (0.18-0.35 recommended)"
        required: false
        default: "0.28"

      audio_kbps:
        description: "Opus audio bitrate"
        required: false
        default: "96"

      preset:
        description: "SVT-AV1 preset (4 recommended)"
        required: false
        default: "4"

      retention_days:
        description: "Artifact retention days"
        required: false
        default: "7"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Read URL list
        id: read
        run: |
          echo "matrix=$(jq -c . .github/workflows/video_urls.json)" >> $GITHUB_OUTPUT

  encode:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        video_url: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3

      - name: Download source video
        run: |
          pip install -q gdown

          FILE_ID=$(echo "${{ matrix.video_url }}" | sed 's|.*/d/\([^/]*\).*|\1|')

          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV

          gdown -O source_video "$FILE_ID"

          echo "Downloaded:"
          du -h source_video

      - name: Probe source + calculate bitrate budget
        run: |
          ffprobe -v quiet \
                  -print_format json \
                  -show_format \
                  -show_streams \
                  source_video > probe.json

          python3 << 'EOF'
          import json
          import os

          with open("probe.json") as f:
              data = json.load(f)

          fmt = data["format"]

          size_bytes = int(fmt["size"])
          duration_s = float(fmt["duration"])

          ratio = float(os.environ.get("INPUT_RATIO", "0.28"))
          audio_kbps = int(os.environ.get("INPUT_AUDIO", "64"))

          target_bytes = size_bytes * ratio

          total_kbps = (target_bytes * 8) / (duration_s * 1000)

          video_kbps = int(total_kbps - audio_kbps)

          # Safety floor for 720p stylized content
          video_kbps = max(video_kbps, 300)

          # Small VBV helps prevent bitrate spikes
          vbv_bufsize = int(video_kbps * 2) 

          # Dynamic CRF estimation
          if video_kbps < 300:
              crf = 38
          elif video_kbps < 450:
              crf = 35
          elif video_kbps < 700:
              crf = 33
          elif video_kbps < 1000:
              crf = 31
          else:
              crf = 29

          size_mb = size_bytes / (1024**2)

          print()
          print("=== Compression Budget ===")
          print(f"Source size     : {size_mb:.1f} MB")
          print(f"Target ratio    : {ratio:.2f}")
          print(f"Target size     : {size_mb * ratio:.1f} MB")
          print(f"Video bitrate   : {video_kbps} kbps")
          print(f"Audio bitrate   : {audio_kbps} kbps")
          print(f"VBV bufsize     : {vbv_bufsize} kbps")
          print(f"Dynamic CRF     : {crf}")

          with open(os.environ["GITHUB_ENV"], "a") as env:
              env.write(f"VIDEO_KBPS={video_kbps}\n")
              env.write(f"AUDIO_KBPS={audio_kbps}\n")
              env.write(f"VBV_BUFSIZE={vbv_bufsize}\n")
              env.write(f"DYNAMIC_CRF={crf}\n")
          EOF
        env:
          INPUT_RATIO: ${{ inputs.size_ratio }}
          INPUT_AUDIO: ${{ inputs.audio_kbps }}

      - name: Encode AV1
        run: |
          echo "Encoding..."

          ffmpeg -y \
            -i source_video \
            -map 0:v:0 \
            -map "0:a?" \
            -vf "scale=-2:720:flags=lanczos" \
            -pix_fmt yuv420p10le \
            -c:v libsvtav1 \
            -preset "${{ inputs.preset }}" \
            -crf "${DYNAMIC_CRF}" \
            -maxrate "${VIDEO_KBPS}k" \
            -bufsize "${VBV_BUFSIZE}k" \
            -svtav1-params \
            tune=0:enable-qm=1:keyint=120:lookahead=60 \
            -c:a libopus \
            -b:a "${AUDIO_KBPS}k" \
            output_720p_av1.webm

      - name: Show results
        run: |
          echo ""
          echo "=== Final Result ==="

          SRC=$(stat -c%s source_video)
          OUT=$(stat -c%s output_720p_av1.webm)

          python3 - << EOF
          src = $SRC
          out = $OUT

          print(f"Source : {src/1024**2:.2f} MB")
          print(f"Output : {out/1024**2:.2f} MB")
          print(f"Saved  : {(1 - out/src)*100:.1f}%")
          EOF

      - name: Upload encoded video
        uses: actions/upload-artifact@v4

        with:
          name: av1_720p_${{ env.FILE_ID }}
          path: output_720p_av1.webm
          retention-days: ${{ inputs.retention_days }}
