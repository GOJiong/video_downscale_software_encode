name: Batch Encode Videos — 1080p → 720p HEVC

on:
  workflow_dispatch:
    inputs:
      size_ratio:
        description: "Target size ratio vs original (0.50 = 50% of source)"
        required: false
        default: "0.50"
      audio_kbps:
        description: "AAC audio bitrate in kbps"
        required: false
        default: "128"
      retention_days:
        description: "Artifact retention in days (1–90)"
        required: false
        default: "7"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node 20 deprecation warnings

jobs:

  # ── Job 1: read video_urls.json and feed it to the matrix ─────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4.6.2

      - name: Read URL list
        id: read
        run: |
          # jq -c compacts the JSON to a single line — required for GITHUB_OUTPUT
          echo "matrix=$(jq -c . .github/workflows/video_urls.json)" >> $GITHUB_OUTPUT

  # ── Job 2: one runner per URL, all run in parallel ────────────────────────
  encode:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false   # one failure won't cancel the other videos
      matrix:
        video_url: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download source video
        run: |
          pip install -q gdown
          FILE_ID=$(echo "${{ matrix.video_url }}" | sed 's|.*/d/\([^/]*\).*|\1|')
          echo "File ID: $FILE_ID"
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV
          gdown -O source_video "$FILE_ID"
          echo "Download complete. Size: $(du -h source_video | cut -f1)"

      - name: Probe source and calculate bitrate budget
        run: |
          ffprobe -v quiet \
                  -print_format json \
                  -show_format -show_streams \
                  source_video | tee probe.json

          python3 - <<'EOF'
          import json, os

          with open("probe.json") as f:
              data = json.load(f)

          fmt          = data["format"]
          size_bytes   = int(fmt["size"])
          duration_s   = float(fmt["duration"])
          total_kbps   = int(fmt.get("bit_rate", 0)) // 1000
          size_mb      = size_bytes / (1024 ** 2)

          ratio        = float(os.environ.get("INPUT_RATIO", "0.50"))
          audio_kbps   = int(os.environ.get("INPUT_AUDIO", "128"))

          target_bytes    = size_bytes * ratio
          target_total_k  = (target_bytes * 8) / (duration_s * 1000)
          video_kbps      = max(int(target_total_k - audio_kbps), 100)

          h = int(duration_s // 3600)
          m = int((duration_s % 3600) // 60)
          s = int(duration_s % 60)
          dur_fmt = f"{h}:{m:02d}:{s:02d}" if h else f"{m}:{s:02d}"

          print(f"\n=== Budget summary ===")
          print(f"  Duration       : {dur_fmt}")
          print(f"  Source size    : {size_mb:.1f} MB")
          print(f"  Source kbps    : {total_kbps:,}")
          print(f"  Target size    : ~{size_mb * ratio:.1f} MB  ({int(ratio*100)}% of source)")
          print(f"  Video budget   : {video_kbps:,} kbps")
          print(f"  Audio budget   : {audio_kbps} kbps AAC")

          if video_kbps < 500:
              print(f"\n  WARNING: video bitrate {video_kbps} kbps is low for 720p!")

          with open(os.environ["GITHUB_ENV"], "a") as env:
              env.write(f"VIDEO_KBPS={video_kbps}\n")
              env.write(f"AUDIO_KBPS={audio_kbps}\n")
          EOF
        env:
          INPUT_RATIO: ${{ inputs.size_ratio }}
          INPUT_AUDIO: ${{ inputs.audio_kbps }}

      - name: Encode to 720p HEVC (x265 slower 2-pass, AAC)
        run: |
          echo "Pass 1/2 — analysis..."
          ffmpeg -y \
            -i source_video \
            -vf "scale=-2:720" \
            -c:v libx265 \
            -preset slower \
            -b:v "${VIDEO_KBPS}k" \
            -x265-params pass=1 \
            -an \
            -f null /dev/null

          echo "Pass 2/2 — encoding..."
          ffmpeg -y \
            -i source_video \
            -vf "scale=-2:720" \
            -c:v libx265 \
            -preset slower \
            -b:v "${VIDEO_KBPS}k" \
            -x265-params pass=2 \
            -tag:v hvc1 \
            -c:a aac \
            -b:a "${AUDIO_KBPS}k" \
            output_720p.mp4

          echo ""
          echo "=== Result ==="
          SRC_SIZE=$(stat -c%s source_video)
          OUT_SIZE=$(stat -c%s output_720p.mp4)
          python3 -c "
          src=$SRC_SIZE; out=$OUT_SIZE
          print(f'  Source : {src/1024**2:.1f} MB')
          print(f'  Output : {out/1024**2:.1f} MB')
          print(f'  Reduction: {(1 - out/src)*100:.1f}%')
          "
      # Artifact name includes the GDrive file ID so each video is distinct
      - name: Upload encoded video
        uses: actions/upload-artifact@v4.6.2
        with:
          name: output_720p_${{ env.FILE_ID }}
          path: output_720p.mp4
          retention-days: ${{ inputs.retention_days }}
          if-no-files-found: error
