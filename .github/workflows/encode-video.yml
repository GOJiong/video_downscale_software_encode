name: Batch Encode Videos — 1080p → 720p AV1

on:
  workflow_dispatch:
    inputs:
      video_kbps:
        description: "Video bitrate in kbps (1100–1400 recommended)"
        required: false
        default: "1350"
      audio_kbps:
        description: "Opus audio bitrate in kbps (96 recommended for game audio)"
        required: false
        default: "96"
      frame_threshold:
        description: "Frame count above which preset switches 4→6 to stay within 6h limit"
        required: false
        default: "40000"
      retention_days:
        description: "Artifact retention days (1–90)"
        required: false
        default: "1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Read URL list
        id: read
        run: |
          echo "matrix=$(jq -c . .github/workflows/video_urls.json)" >> $GITHUB_OUTPUT

  encode:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        video_url: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3

      - name: Download source video
        run: |
          pip install -q gdown
          FILE_ID=$(echo "${{ matrix.video_url }}" | sed 's|.*/d/\([^/]*\).*|\1|')
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV
          gdown -O source_video "$FILE_ID"
          echo "Downloaded: $(du -h source_video | cut -f1)"

      - name: Probe source and select preset
        run: |
          ffprobe -v quiet \
                  -print_format json \
                  -show_format -show_streams \
                  source_video | tee probe.json

          python3 - <<'EOF'
          import json, os

          with open("probe.json") as f:
              data = json.load(f)

          fmt        = data["format"]
          duration_s = float(fmt["duration"])
          threshold  = int(os.environ.get("INPUT_THRESHOLD", "40000"))
          video_kbps = int(os.environ.get("INPUT_VIDEO_KBPS", "1350"))
          audio_kbps = int(os.environ.get("INPUT_AUDIO_KBPS", "96"))

          fps_raw = None
          for stream in data.get("streams", []):
              if stream.get("codec_type") == "video":
                  fps_raw = stream.get("r_frame_rate") or stream.get("avg_frame_rate")
                  break

          if fps_raw and "/" in fps_raw:
              num, den = fps_raw.split("/")
              fps = float(num) / float(den) if float(den) else 0.0
          else:
              fps = float(fps_raw) if fps_raw else 0.0

          frame_count = int(duration_s * fps) if fps > 0 else 0
          preset = 6 if frame_count > threshold else 4

          h = int(duration_s // 3600)
          m = int((duration_s % 3600) // 60)
          s = int(duration_s % 60)
          dur_fmt = f"{h}:{m:02d}:{s:02d}" if h else f"{m}:{s:02d}"

          print(f"\n=== Encode Plan ===")
          print(f"  Duration       : {dur_fmt}")
          print(f"  FPS            : {fps:.3f}")
          print(f"  Frame count    : {frame_count:,}  (threshold: {threshold:,})")
          print(f"  Preset         : {preset}  ({'thorough' if preset == 4 else 'faster — long video'})")
          print(f"  Video bitrate  : {video_kbps:,} kbps (fixed)")
          print(f"  Audio bitrate  : {audio_kbps} kbps Opus")
          print(f"  Encode method  : 2-pass VBR (always)")

          with open(os.environ["GITHUB_ENV"], "a") as env:
              env.write(f"VIDEO_KBPS={video_kbps}\n")
              env.write(f"AUDIO_KBPS={audio_kbps}\n")
              env.write(f"FRAME_COUNT={frame_count}\n")
              env.write(f"PRESET={preset}\n")
          EOF
        env:
          INPUT_THRESHOLD:  ${{ inputs.frame_threshold }}
          INPUT_VIDEO_KBPS: ${{ inputs.video_kbps }}
          INPUT_AUDIO_KBPS: ${{ inputs.audio_kbps }}

      - name: Encode to 720p AV1 — 2-pass VBR
        run: |
          SVT_PARAMS="tune=0:enable-qm=1:keyint=120:lookahead=60"

          echo ">>> 2-pass VBR | preset ${PRESET} | ${VIDEO_KBPS}k target | ${FRAME_COUNT} frames"

          echo "Pass 1/2 — analysis..."
          ffmpeg -y \
            -i source_video \
            -vf "scale=-2:720:flags=lanczos" \
            -pix_fmt yuv420p10le \
            -c:v libsvtav1 \
            -preset "${PRESET}" \
            -b:v "${VIDEO_KBPS}k" \
            -svtav1-params "${SVT_PARAMS}" \
            -pass 1 \
            -an -f null /dev/null

          echo "Pass 2/2 — encoding..."
          ffmpeg -y \
            -i source_video \
            -vf "scale=-2:720:flags=lanczos" \
            -pix_fmt yuv420p10le \
            -c:v libsvtav1 \
            -preset "${PRESET}" \
            -b:v "${VIDEO_KBPS}k" \
            -svtav1-params "${SVT_PARAMS}" \
            -pass 2 \
            -map 0:v:0 -map "0:a?" \
            -c:a libopus \
            -b:a "${AUDIO_KBPS}k" \
            output_720p_av1.webm

          echo ""
          echo "=== Result ==="
          SRC=$(stat -c%s source_video)
          OUT=$(stat -c%s output_720p_av1.webm)
          python3 -c "
          src=$SRC; out=$OUT
          print(f'  Preset   : ${PRESET}')
          print(f'  Source   : {src/1024**2:.1f} MB')
          print(f'  Output   : {out/1024**2:.1f} MB')
          print(f'  Saved    : {(1 - out/src)*100:.1f}%')
          "

      - name: Upload encoded video
        uses: actions/upload-artifact@v4
        with:
          name: av1_720p_${{ env.FILE_ID }}
          path: output_720p_av1.webm
          retention-days: ${{ inputs.retention_days }}
          if-no-files-found: error
